name: BELA Import
description: Prepare a repository, run the matching BELA updater offline, and upload the generated ECD file to BELA.

inputs:
  bela-api-url:
    description: Base URL of the BELA backend, for example https://bela.example.com.
    required: true
  parent-element-path:
    description: Optional BELA parent element path.
    required: false

outputs:
  language:
    description: Detected language importer.
    value: ${{ steps.detect.outputs.language }}

runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      run: ${{ github.action_path }}/scripts/detect-language.sh

    - shell: bash
      run: ${{ github.action_path }}/scripts/prepare.sh

    - shell: bash
      env:
        BELA_PARENT_ELEMENT_PATH: ${{ inputs.parent-element-path }}
      run: ${{ github.action_path }}/scripts/run-updater.sh

    - shell: bash
      env:
        BELA_API_URL: ${{ inputs.bela-api-url }}
      run: ${{ github.action_path }}/scripts/upload.sh
