name: BELA Import
description: Prepare a repository, run the matching BELA updater offline, and upload the generated ECD file to BELA.

outputs:
  languages:
    description: Detected language importers.
    value: ${{ steps.import.outputs.languages }}
  sources:
    description: Imported BELA source names.
    value: ${{ steps.import.outputs.sources }}

runs:
  using: composite
  steps:
    - id: import
      shell: bash
      run: ${{ github.action_path }}/scripts/import-projects.sh
